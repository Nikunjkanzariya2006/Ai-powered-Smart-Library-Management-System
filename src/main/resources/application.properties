# Chat Memory (JDBC)
spring.ai.chat.memory.repository.jdbc.initialize-schema=always

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# DevTools
spring.devtools.livereload.enabled=false

# Task Scheduling
spring.task.scheduling.pool.size=5

# OAuth2 Google Login
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Server
server.port=8080
server.servlet.multipart.max-file-size=200MB
server.servlet.multipart.max-request-size=220MB

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.callback.base-url=http://localhost:5173

# App URLs
app.frontend.reset-url=http://localhost:5173/auth/reset-password?token=
app.frontend.verify-url=http://localhost:5173/verify-email?token=

# Library Notification
library.notification.from=${NOTIFICATION_EMAIL_FROM}
library.notification.enabled=true
library.notification.due-reminder-days=3

# Subscription
subscription.default.plan=MONTHLY
subscription.auto.renew.enabled=false
subscription.expiry.check.cron=0 0 2 * * ?

# Logging
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.org.springframework.web.client.RestClient=INFO
logging.level.org.springframework.web.client=INFO
logging.level.org.springframework.http.client=INFO
logging.level.org.springframework.ai.chat.client.advisor=INFO
