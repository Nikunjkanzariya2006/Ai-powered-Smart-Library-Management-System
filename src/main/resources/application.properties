# Application
spring.application.name=Library-Management-System

spring.data.redis.host=localhost
spring.data.redis.port = 6379

# Database (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/library_management_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Spring AI (OpenAI via NVIDIA endpoint)
spring.ai.openai.api-key=${LLM_MODEL_API_KEY}
spring.ai.openai.base-url=${LLM_MODEL_BASE_URL}
spring.ai.openai.chat.options.model=${LLM_MODEL_NAME}
spring.ai.openai.chat.options.temperature=0.2

